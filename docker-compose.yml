services:
  sara-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sara-gateway
    restart: unless-stopped
    volumes:
      - sara_data:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HERMES_DEFAULT_MODEL=${HERMES_DEFAULT_MODEL}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
    command: ["gateway", "run"]

  sara-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sara-dashboard
    restart: unless-stopped
    depends_on:
      - sara-gateway
    volumes:
      - sara_data:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
    ports:
      - "9119:9119"
    command: ["dashboard", "--host", "0.0.0.0", "--no-open"]

volumes:
  sara_data:
